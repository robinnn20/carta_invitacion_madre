<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carmen — 50 Años</title>

  <meta property="og:image" content="{DEPLOY_URL}/foto_mama.jpeg">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E4C97E;--gold-pale:#F5E6C0;--cream:#FAF6EE;--rose:#D4A5A0;--deep:#1a1108}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:#1a1108;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:16px 0 32px;overflow-x:hidden}
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:var(--gold-light);animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);opacity:0}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--op,.7);transform:scale(1)}}
.particles-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;bottom:-20px;border-radius:50%;animation:float var(--dur,6s) ease-in var(--delay2,0s) infinite;opacity:0}
@keyframes float{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-110vh) rotate(720deg);opacity:0}}

/* CARD */
.card{position:relative;z-index:1;width:min(440px,94vw);background:linear-gradient(160deg,#2a1f0e 0%,#1a1108 40%,#221508 100%);border-radius:24px;overflow:hidden;box-shadow:0 0 0 1px rgba(201,168,76,.2),0 0 50px rgba(201,168,76,.07),0 25px 70px rgba(0,0,0,.7);animation:cardReveal 1.1s cubic-bezier(.16,1,.3,1) both}
@keyframes cardReveal{from{opacity:0;transform:translateY(36px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.card::before{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;background:linear-gradient(135deg,rgba(201,168,76,.6),rgba(201,168,76,.1),rgba(201,168,76,.4),rgba(201,168,76,.05),rgba(201,168,76,.5));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:10}

/* HERO */
.hero{position:relative;padding:20px 18px 12px;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,.18) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(212,165,160,.1) 0%,transparent 60%)}
.ornament-top{font-size:10px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;opacity:0;animation:fadeUp .8s ease .4s forwards;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.ornament-top::before,.ornament-top::after{content:'';display:block;width:24px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.ornament-top::after{background:linear-gradient(90deg,var(--gold),transparent)}

/* PHOTO CIRCLE */
.photo-frame{width:108px;height:108px;border-radius:50%;margin:0 auto 6px;position:relative;opacity:0;animation:scalePop .7s cubic-bezier(.34,1.56,.64,1) .5s forwards}
.photo-frame::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:linear-gradient(135deg,var(--gold-light),var(--gold),#a07828,var(--gold-light));animation:rotateBorder 4s linear infinite;z-index:0}
@keyframes rotateBorder{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.photo-frame::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(201,168,76,.3);animation:ripple 2.5s ease-out 1.3s infinite}
@keyframes ripple{from{transform:scale(1);opacity:.6}to{transform:scale(1.25);opacity:0}}
.photo-inner{position:relative;z-index:1;width:100%;height:100%;border-radius:50%;overflow:hidden;border:3px solid #1a1108}
.photo-inner img{width:100%;height:100%;object-fit:cover;object-position:center top}
@keyframes scalePop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

.age-tag{position:absolute;bottom:2px;right:2px;z-index:2;width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-light),var(--gold));font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:#1a1108;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(201,168,76,.5);border:2px solid #1a1108}

.invite-label{font-size:14px;letter-spacing:.3em;color:var(--gold-light);text-transform:uppercase;font-weight:300;opacity:0;animation:fadeUp .8s ease .65s forwards;margin-bottom:2px}
.name{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,10vw,48px);font-weight:300;color:var(--cream);line-height:1;letter-spacing:.02em;opacity:0;animation:fadeUp .8s ease .8s forwards;margin-bottom:0}
.name em{font-style:italic;color:var(--gold-light)}
.subtitle{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--rose);font-weight:300;opacity:0;animation:fadeUp .8s ease .95s forwards;margin-bottom:5px}
.honor-text{font-size:15px;font-weight:300;color:rgba(245,230,192,.75);line-height:1.3;letter-spacing:.01em;opacity:0;animation:fadeUp .8s ease 1.1s forwards;max-width:300px;margin:0 auto}

/* DIVIDER */
.divider{display:flex;align-items:center;justify-content:center;gap:8px;padding:0 18px;margin:1px 0;opacity:0;animation:fadeUp .6s ease 1.2s forwards}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent)}
.divider-gem{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 6px rgba(201,168,76,.6)}

/* DETAILS */
.details{padding:8px 16px 6px;opacity:0;animation:fadeUp .8s ease 1.3s forwards}
.details-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.detail-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:10px 8px;text-align:center;transition:all .3s}
.detail-card:hover{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.3);transform:translateY(-2px)}
.detail-card.full{grid-column:auto}
.detail-icon{font-size:15px;margin-bottom:2px;display:block}
.detail-label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.detail-value{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);line-height:1.15}
.detail-value small{font-family:'Jost',sans-serif;font-size:13px;color:rgba(245,230,192,.5);font-weight:300;display:block;margin-top:0}

/* DRESS */
.dresscode{margin:6px 16px;background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:8px 10px;display:flex;align-items:center;gap:7px;opacity:0;animation:fadeUp .8s ease 1.5s forwards}
.dresscode-icon{font-size:17px}
.dresscode-text .label{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.dresscode-text .value{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--cream)}

/* QUOTE */
.quote-section{margin:7px 16px 0;padding:10px 13px;border-radius:16px;background:radial-gradient(ellipse at center,rgba(201,168,76,.08) 0%,transparent 70%);border:1px solid rgba(201,168,76,.12);text-align:center;opacity:0;animation:fadeUp .8s ease 1.65s forwards;position:relative;overflow:hidden}
.quote-section::before{content:'"';position:absolute;font-family:'Cormorant Garamond',serif;font-size:68px;color:rgba(201,168,76,.07);line-height:1;top:-10px;left:6px}
.quote-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;font-weight:400;color:var(--gold-pale);line-height:1.35;position:relative;z-index:1}

/* CTA */
/* CONTACT */
.contact{padding:4px 16px 12px;text-align:center;opacity:0;animation:fadeUp .8s ease 1.8s forwards}
.contact-label{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,168,76,.5);margin-bottom:3px}
.contact-phone{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold-light);letter-spacing:.05em;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.contact-note{font-size:14px;line-height:1.35;color:rgba(245,230,192,.72);margin-top:6px}

/* FOOTER */
.footer-bar{margin:0 16px 10px;padding-top:8px;border-top:1px solid rgba(201,168,76,.12);display:flex;align-items:center;justify-content:center;gap:8px;opacity:0;animation:fadeUp .8s ease 1.95s forwards}
.footer-gem{width:4px;height:4px;background:var(--gold);transform:rotate(45deg);opacity:.5}
.footer-text{font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:rgba(201,168,76,.35)}

/* flower deco */
.flower-deco{position:absolute;opacity:.1;pointer-events:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="starfield" id="starfield"></div>
<div class="particles-container" id="particles"></div>

<div class="card">
  <div class="hero">
    <div class="hero-bg"></div>
    <svg class="flower-deco" style="top:-8px;left:-8px;width:90px" viewBox="0 0 120 120" fill="none"><path d="M60 60 C40 40,20 50,30 70 C40 90,60 80,60 60Z" fill="#C9A84C"/><path d="M60 60 C80 40,100 50,90 70 C80 90,60 80,60 60Z" fill="#C9A84C"/><path d="M60 60 C40 80,50 100,70 90 C90 80,80 60,60 60Z" fill="#C9A84C"/><path d="M60 60 C80 80,70 100,50 90 C30 80,40 60,60 60Z" fill="#C9A84C"/><circle cx="60" cy="60" r="12" fill="#E4C97E"/></svg>
    <svg class="flower-deco" style="bottom:-8px;right:-8px;width:80px;transform:rotate(180deg)" viewBox="0 0 120 120" fill="none"><path d="M60 60 C40 40,20 50,30 70 C40 90,60 80,60 60Z" fill="#D4A5A0"/><path d="M60 60 C80 40,100 50,90 70 C80 90,60 80,60 60Z" fill="#D4A5A0"/><path d="M60 60 C40 80,50 100,70 90 C90 80,80 60,60 60Z" fill="#D4A5A0"/><path d="M60 60 C80 80,70 100,50 90 C30 80,40 60,60 60Z" fill="#D4A5A0"/><circle cx="60" cy="60" r="10" fill="#E4C97E"/></svg>


    <!-- PHOTO -->
    <div class="photo-frame">
      <div class="photo-inner">
        <img src="foto_mama.jpeg" alt="Carmen">
      </div>
      <div class="age-tag">50</div>

  <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-gem" style="opacity:.4;width:4px;height:4px"></div><div class="divider-gem"></div><div class="divider-line"></div></div>

  <div class="details">
    <div class="details-grid">
      <div class="detail-card"><div class="detail-label">Fecha</div><div class="detail-value">16 de Mayo<small>2026</small></div></div>

      <div class="detail-card full"><div class="detail-label">Lugar</div><div class="detail-value">Xoapa #1303<small>La Florida</small></div></div>
    </div>
  </div>

  <div class="dresscode">
    <div class="dresscode-text"><div class="label">Vestimenta</div><div class="value">Formal o Sport Elegante</div></div>
  </div>

  <div class="divider" style="margin-top:14px"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>


  <div class="contact">
    <div class="contact-note">Favor confirmar asistencia a mi numero!.</div>
    <a class="contact-phone" href="tel:+56992931773">+56 9 9293 1773</a>
  </div>

  <div class="footer-bar">
    <div class="footer-gem"></div>
    <div class="footer-text">Con amor & celebración</div>
    <div class="footer-gem"></div>
  </div>
</div>

<script>
const sf=document.getElementById('starfield');
for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+.5;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--op:${.3+Math.random()*.7}`;sf.appendChild(s)}
const pc=document.getElementById('particles');
const cols=['rgba(201,168,76,.7)','rgba(228,201,126,.6)','rgba(212,165,160,.5)','rgba(255,255,220,.5)'];
for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';const z=Math.random()*5+2;p.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;background:radial-gradient(circle,${cols[Math.floor(Math.random()*cols.length)]},transparent);--dur:${7+Math.random()*8}s;--delay2:${Math.random()*8}s`;pc.appendChild(p)}
</script>
</body>
</html>
